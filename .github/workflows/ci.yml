name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  xcode-build:
    name: Xcode build
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List project
        run: xcodebuild -list -project ChatWithAnyone.xcodeproj

      - name: Check iOS 26 SDK support
        id: sdk
        run: |
          set -euo pipefail

          SDK_PATH="$(xcrun --sdk iphonesimulator --show-sdk-path)"
          echo "Simulator SDK: ${SDK_PATH}"

          if [[ "${SDK_PATH}" == *"iPhoneSimulator26"* ]] && [[ -d "${SDK_PATH}/System/Library/Frameworks/FoundationModels.framework" ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
            echo "::notice title=Build skipped::ChatWithAnyone requires the iOS 26 simulator SDK and FoundationModels.framework. The hosted runner does not currently provide that SDK."
          fi

      - name: Build
        if: steps.sdk.outputs.available == 'true'
        run: |
          set -o pipefail
          xcodebuild \
            -project ChatWithAnyone.xcodeproj \
            -scheme ChatWithAnyone \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
